version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: warehouse_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warehouse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: warehouse_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/warehouse_db
      - APP_ENV=production
      - DEBUG=False
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ../
      dockerfile: docker/Dockerfile.dashboard
    container_name: warehouse_dashboard
    restart: always
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
